        let currentSlideIndex = 0;

        // Render Slide Sidebar items list
        function renderSidebar() {
            const listContainer = document.getElementById("sidebar-list");
            listContainer.innerHTML = "";
            slides.forEach((slide, index) => {
                const btn = document.createElement("button");
                btn.className = `text-left text-sm sm:text-base p-3.5 rounded-xl border transition-all flex justify-between items-center w-full ${
                    index === currentSlideIndex 
                        ? "bg-cyanNeon/10 border-cyanNeon text-cyanNeon font-bold" 
                        : "bg-slate-900 border-borderSlate hover:border-slate-500 text-slate-400"
                }`;
                btn.onclick = () => {
                    goToSlide(index);
                    if (window.innerWidth < 640) { // Mobile toggle sidebar close
                        toggleSidebar();
                    }
                };
                
                // Truncate title for sidebar view
                const titleText = slide.title.length > 28 ? slide.title.substring(0, 28) + "..." : slide.title;
                btn.innerHTML = `
                    <span>${titleText}</span>
                    <span class="font-tech text-xs bg-slate-800 px-2 py-0.5 rounded text-slate-500">${slide.chapter}</span>
                `;
                listContainer.appendChild(btn);
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.classList.toggle("translate-x-full");
        }

        // Main Slide Render function
        function renderSlide() {
            const currentSlide = slides[currentSlideIndex];
            const slideContainer = document.getElementById("slide-content");
            
            // Format slide number labels
            const numText = (currentSlideIndex + 1).toString().padStart(2, '0');
            const totalText = slides.length.toString().padStart(2, '0');
            document.getElementById("slide-number-display").innerText = `SLIDE ${numText} / ${totalText}`;
            
            // Inject dynamic HTML content
            slideContainer.innerHTML = currentSlide.html;
            
            // Rehydrate/restore interactive states if available
            rehydrateInteractiveElements();
        }

        function nextSlide() {
            if (currentSlideIndex < slides.length - 1) {
                currentSlideIndex++;
                renderSlide();
                renderSidebar();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
                renderSidebar();
            }
        }

        function goToSlide(index) {
            currentSlideIndex = index;
            renderSlide();
            renderSidebar();
        }

        // Interaction helper (Click-to-reveal answers on slides)
        function revealSection(id) {
            const section = document.getElementById(id);
            if (section) {
                section.classList.toggle("hidden");
            }
        }

        function submitQuizChoice(choiceId) {
            quizAnswers[currentSlideIndex] = choiceId;
            const feedback = document.getElementById("quiz-feedback");
            
            // Reset borders and backgrounds
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`quiz-btn-${i}`);

                    btn.className = "text-left p-4 rounded-xl bg-slate-800 border border-slate-750 hover:bg-slate-700 transition-all text-slate-300 text-sm sm:text-base";
                }
            }
            
            const selectedBtn = document.getElementById(`quiz-btn-${choiceId}`);

            if (choiceId === 3) {
                selectedBtn.className = "text-left p-4 rounded-xl bg-emeraldNeon/15 border-emeraldNeon/50 text-emeraldNeon transition-all font-bold text-sm sm:text-base";

            } else if (choiceId === 1) {
                selectedBtn.className = "text-left p-4 rounded-xl bg-roseNeon/15 border-roseNeon/50 text-roseNeon transition-all font-bold text-sm sm:text-base";
                feedback.innerHTML = `<span class="text-roseNeon"><i class="fa-solid fa-circle-xmark"></i> ยังไม่ถูกต้อง! คอมพิวเตอร์ไวรัส (Virus) จำเป็นอย่างยิ่งที่จะต้องพึ่งพาสิทธิ์หรือพฤติกรรมของผู้ใช้ในการคลิกเปิดรันไฟล์เพื่อเรียกแพร่กระจายเชื้อเสมอ</span>`;
            } else {
                selectedBtn.className = "text-left p-4 rounded-xl bg-roseNeon/15 border-roseNeon/50 text-roseNeon transition-all font-bold text-sm sm:text-base";

            }
        }

        // Rehydrate/restore state of elements after slide navigation switches
        function rehydrateInteractiveElements() {
            if (currentSlideIndex === 32 && quizAnswers[currentSlideIndex]) { // Restore Slide 33 Quiz Choice
                submitQuizChoice(quizAnswers[currentSlideIndex]);
            }
        }

        // Listen for Keyboard Navigation Shortcuts
        document.addEventListener("keydown", function(event) {
            if (event.key === "ArrowRight") {
                nextSlide();
            } else if (event.key === "ArrowLeft") {
                prevSlide();
            }
        });

        // Touch swipe handler for mobile devices
        let touchstartX = 0;
        let touchendX = 0;
        
        function handleSwipeGesture() {
            if (touchendX < touchstartX - 65) {
                nextSlide(); // Swipe Left -> Go Next
            }
            if (touchendX > touchstartX + 65) {
                prevSlide(); // Swipe Right -> Go Prev
            }
        }
        
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, false);
        
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipeGesture();
        }, false);

        // Initialize presentation stack on document loaded
        window.onload = () => {
            renderSlide();
            renderSidebar();
        }
    </script>
