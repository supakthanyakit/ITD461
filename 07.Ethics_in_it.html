        function rehydrateSlideState() {
            if (selectedAnswers[currentSlideIndex]) {
                if (currentSlideIndex === 9) {
                    selectChoice(selectedAnswers[currentSlideIndex]);
                } else if (currentSlideIndex === 22) {
                    selectEthicalChoice(selectedAnswers[currentSlideIndex]);
                } else if (currentSlideIndex === 33) {
                    selectQuizAnswer(selectedAnswers[currentSlideIndex]);
                }
            }
        }

        // Keyboard navigation setup
        document.addEventListener("keydown", function(event) {
            if (event.key === "ArrowRight") {
                nextSlide();
            } else if (event.key === "ArrowLeft") {
                prevSlide();
            }
        });

        // Touch gesture controls
        let touchstartX = 0;
        let touchendX = 0;
        
        function handleGesture() {
            if (touchendX < touchstartX - 60) {
                nextSlide();
            }
            if (touchendX > touchstartX + 60) {
                prevSlide();
            }
        }
        
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, false);
        
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleGesture();
        }, false);

        window.onload = () => {
            renderSlide();
            renderSidebar();
        }
    </script>
