        function renderSidebarMenu() {
            const sidebarList = document.getElementById("sidebar-list");
            sidebarList.innerHTML = "";
            slideDeck.forEach((slide, idx) => {
                const btn = document.createElement("button");
                btn.onclick = () => {
                    appState.activeSlide = idx;
                    loadActiveSlide();
                    if (window.innerWidth < 768) {
                        toggleSidebar();
                    }
                };
                
                const isActive = appState.activeSlide === idx;
                btn.className = `w-full text-left text-xs sm:text-sm p-3 rounded-xl transition-all flex justify-between items-center ${
                    isActive 
                    ? "bg-accentTeal/10 text-accentTeal font-bold shadow-md" 
                    : "bg-slate-900 text-slate-400 hover:bg-slate-800"
                }`;
                btn.innerHTML = `
                    <span>S${(idx+1).toString().padStart(2, '0')}: ${slide.title}</span>
                    <span class="text-[9px] bg-slate-800 px-1.5 py-0.5 rounded text-slate-500 font-bold">${slide.chapter}</span>
                `;
                sidebarList.appendChild(btn);
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.classList.toggle("translate-x-full");
        }

        function loadActiveSlide() {
            const workspace = document.getElementById("slide-workspace");
            const slide = slideDeck[appState.activeSlide];
            
            workspace.innerHTML = slide.html;
            
            // Re-render and apply saved active interactions inside specific slides
            rehydrateSlideInteractions();
            
            // Update progress text
            const textNum = (appState.activeSlide + 1).toString().padStart(2, '0');
            const totalNum = slideDeck.length.toString().padStart(2, '0');
            document.getElementById("progress-indicator").innerText = `Slide ${textNum} / ${totalNum}`;
            
            renderSidebarMenu();
        }

        function navigateSlide(direction) {
            if (direction === 'next' && appState.activeSlide < slideDeck.length - 1) {
                appState.activeSlide++;
            } else if (direction === 'prev' && appState.activeSlide > 0) {
                appState.activeSlide--;
            }
            loadActiveSlide();
        }

        function rehydrateSlideInteractions() {
            if (appState.activeSlide === 2 && appState.pollVote) { // Slide 3 Poll
                votePoll(appState.pollVote, true);

            if (appState.activeSlide === 5) { // Slide 6 Privacy types
                changePrivacyType(appState.privacyTypeActive);
            }
            if (appState.activeSlide === 15) { // Slide 16 Public Interest
                changePublicTopic(appState.publicInterestTopic);
            }
            if (appState.activeSlide === 17) { // Slide 18 Scenario Vote
                // Check if scenarios were already voted on
            }

                    const ans = appState.hateSpeechAnswers[key];
                    sortSpeech(key, ans, true);

            if (appState.activeSlide === 23) { // Slide 24 Checklist check

                    if (chk) chk.checked = isChecked;
                });
                evalStopFeedback();
            }
            if (appState.activeSlide === 28 && appState.quizAnswers['s29']) { // Slide 29 Quiz
                submitSlide29Quiz(appState.quizAnswers['s29']);
            }
        }

        function votePoll(choice, isRehydrating = false) {
            appState.pollVote = choice;
            ['A', 'B', 'C'].forEach(ch => {
                const btn = document.getElementById(`poll-${ch}`);
                const percentSpan = document.getElementById(`percent-${ch}`);
                if (btn && percentSpan) {
                    if (ch === choice) {
                        btn.className = "w-full text-left p-4 rounded-xl bg-accentTeal/10 text-white font-bold text-sm transition-all flex justify-between items-center shadow-md";
                    } else {
                        btn.className = "w-full text-left p-4 rounded-xl text-slate-500 bg-slate-900/40 text-sm transition-all flex justify-between items-center pointer-events-none";

            {
                title: "2. Information Privacy (ความเป็นส่วนตัวของข้อมูล)",
                text: "หรือ Data Privacy คือ สิทธิในการกำหนด ควบคุม และคัดค้านในการประมวลผลข้อมูลส่วนตัวของเรา (เช่น ประวัติการใช้จ่าย บัญชีการแพทย์ รหัสพนักงาน เบอร์โทรศัพท์) ตลอดจนการทำสัญญา PDPA ป้องกันผู้ดูแลข้อมูลนำสถิติชีวิตไปจัดจำหน่ายต่อให้บริษัทเครือข่ายอื่น"
            },
            {
                title: "3. Communication Privacy (ความเป็นส่วนตัวในการสื่อสาร)",
                text: "สิทธิในการส่งผ่าน พูดสาย โทรศัพท์ ส่งข้อความ หรืออีเมลหากันเป็นการส่วนตัว โดยได้รับการยืนยันการเข้ารหัสสิทธิ์ขั้นพื้นฐาน ป้องกันไม่ให้ใคร แฮกเกอร์ หรือผู้ให้บริการเครือข่ายเข้ามาแอบดักจับบันทึกไฟล์คำสนทนาของเราไปจัดระบบสอดแนม"
            },
            {
                title: "4. Location Privacy (ความเป็นส่วนตัวของพิกัดและตำแหน่ง)",
                text: "สิทธิในการปกป้องและรักษาข้อมูลการเดินทาง พิกัดแผนที่ (GPS) ของตนเอง ปฏิเสธไม่ให้ระบบเครือข่ายมือถือ หรือแอปพลิเคชันจัดพาสฟังก์ชันติดตามประวัติการเดินตลาดหรือการสัญจรของเราอย่างแม่นยำตลอด 24 ชั่วโมง เพื่อส่งโฆษณาตามเป้าหมายแบบบังคับรับ"
            },
            {
                title: "5. Online Privacy (ความเป็นส่วนตัวในโลกออนไลน์)",
                text: "ขอบเขตสิทธิการจำกัดตัวตน บัญชีลับ หรือหน้าโปรไฟล์เสมือนในโลกอินเทอร์เน็ต พลเมืองออนไลน์ควรมีสิทธิเลือกพิกัดความลับของรูปถ่าย ความเป็นส่วนตัวในกล่องสนทนารายบุคคล และการเลือกตั้งค่าจำกัดเพื่อนที่จะเข้าสอดส่องสตอรี่ในช่องกิจกรรมได้"
            }
        ];

        function changePrivacyType(index) {
            appState.privacyTypeActive = index;
            const container = document.getElementById("privacy-explain-container");
            if (!container) return;
            
            // Render active class styling inside button tabs
            for (let i = 0; i < 5; i++) {
                const btn = document.getElementById(`priv-btn-${i}`);
                if (btn) {
                    if (i === index) {
                        btn.className = "w-full text-left p-3.5 rounded-xl bg-accentTeal/10 text-white font-bold text-sm transition-all flex items-center justify-between shadow-sm";
                    } else {
                        btn.className = "w-full text-left p-3.5 rounded-xl bg-slate-900 text-slate-300 text-sm hover:bg-slate-800 transition-all flex items-center justify-between shadow-sm";
                    }
                }
            }
            
            const detail = privacyDetails[index];
            container.innerHTML = `
                <h4 class="text-lg font-bold text-accentTeal mb-2">${detail.title}</h4>
                <p class="text-xs sm:text-sm text-slate-300 leading-relaxed">${detail.text}</p>
            `;
        }

        const publicInterestDetails = {
            politician: {
                title: "<i class='fa-solid fa-user-tie mr-1'></i> นักการเมือง / ผู้บริหารประเทศ",
                reveal: "บัญชีทรัพย์สินและหนี้สินทั้งหมด, บันทึกการเจจาพบล็อบบี้ยิสต์ของพรรค, ประวัติความขัดแย้งทางด้านผลประโยชน์ทับซ้อน เพื่อประโยชน์ในการตรวจสอบสกัดกั้นการโกงประเทศ",
                protect: "ประวัติทางการแพทย์ สุขภาพ โรคประจำตัวที่ไม่ส่งผลเสียต่อขีดความสามารถการบริหารราชการ, กิจกรรมชีวิตส่วนตัวของลูกๆ ที่ไร้เงื่อนไขทางการเมือง"
            },
            doctor: {
                title: "<i class='fa-solid fa-user-doctor mr-1'></i> แพทย์ / บุคลากรสาธารณสุข",
                reveal: "ใบรับรองวิชาชีพแพทย์, ประวัติการได้รับวัคซีนและผลตรวจเชื้อในการรักษาผู้ป่วยวิกฤต, บันทึกข้อพิพาทความบกพร่องทางหัตถการ เพื่อปกป้องสิทธิ์ผู้เข้ารักษา",
                protect: "ชีวิตการเดินทางหลังพักจากการทำงาน, บัญชีการเงินส่วนตัวที่ไม่เชื่อมต่อกับสหกรณ์ของโรงพยาบาล, ทัศนคติทางการเมืองหรือความชื่นชอบดนตรีศิลปะส่วนบุคคล"
            },
            celebrity: {
                title: "<i class='fa-solid fa-star mr-1'></i> ดารา / ศิลปิน / Influencer",
                reveal: "การรับงานสปอนเซอร์โฆษณา, ประวัติผลประโยชน์หุ้นส่วนของบริษัทสื่อสารมวลชน, ความถูกต้องในการเสียภาษีรายปี เพื่อเป็นขวัญกำลังใจที่ดีต่อผู้รับชมเยาวชน",
                protect: "พิกัดแฟลตหรือบ้านพักของครอบครัวเพื่อป้องกันภัยจากซุปเปอร์แฟน (Stalking), ความเป็นส่วนตัวทางความรักและความสัมพันธ์ที่ไม่มีเงื่อนไขทางคดีอาญา"
            }
        };

        function changePublicTopic(topic) {
            appState.publicInterestTopic = topic;
            const container = document.getElementById("public-topic-container");
            if (!container) return;
            
            ['politician', 'doctor', 'celebrity'].forEach(t => {
                const btn = document.getElementById(`pub-btn-${t}`);
                if (btn) {
                    if (t === topic) {
                        btn.className = "w-full text-left p-3 rounded-xl bg-accentAmber/10 text-white font-bold text-xs sm:text-sm transition-all flex items-center justify-between shadow-sm";
                    } else {
                        btn.className = "w-full text-left p-3 rounded-xl bg-slate-900 text-slate-300 text-xs sm:text-sm hover:bg-slate-800 transition-all flex items-center justify-between shadow-sm";
                    }
                }
            });
            
            const item = publicInterestDetails[topic];
            container.innerHTML = `
                <h4 class="text-base sm:text-lg font-bold text-accentAmber">${item.title}</h4>
                <p class="text-xs text-slate-300 leading-relaxed">
                    <strong>สิทธิ์ที่ควรถูกเปิดเผย:</strong> ${item.reveal}
                </p>
                <p class="text-xs text-slate-400 border-t border-slate-800/10 pt-2 leading-relaxed">
                    <strong>สิทธิ์ที่ควรได้รับการปกป้อง:</strong> ${item.protect}
                </p>
            `;
        }

        function toggleTeacherView(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle("hidden");
        }

        function voteScenario(choice) {
            const btnYes = document.getElementById("scen-yes");
            const btnNo = document.getElementById("scen-no");
            const pYes = document.getElementById("scen-yes-p");
            const pNo = document.getElementById("scen-no-p");
            if (!btnYes || !btnNo) return;
            
            if (choice === 'yes') {
                btnYes.className = "w-full text-left p-2.5 rounded bg-accentTeal/10 text-white font-bold text-xs transition-all flex justify-between items-center shadow-md";
                btnNo.className = "w-full text-left p-2.5 rounded text-slate-500 bg-slate-900/40 text-xs transition-all flex justify-between items-center pointer-events-none";
            } else {
                btnNo.className = "w-full text-left p-2.5 rounded bg-accentTeal/10 text-white font-bold text-xs transition-all flex justify-between items-center shadow-md";
                btnYes.className = "w-full text-left p-2.5 rounded text-slate-500 bg-slate-900/40 text-xs transition-all flex justify-between items-center pointer-events-none";
            }
            pYes.classList.remove("hidden");
            pNo.classList.remove("hidden");
        }

        function sortSpeech(qNum, type, isRehydrating = false) {
            if (!isRehydrating) {
                appState.hateSpeechAnswers[qNum] = type;
            }
            const feedback = document.getElementById(`sort-feedback-${qNum}`);
            const btnOp = document.getElementById(`sort-${qNum}-op`);
            const btnHate = document.getElementById(`sort-${qNum}-hate`);
            if (!feedback || !btnOp || !btnHate) return;
            
            if (type === 'op') {
                btnOp.className = "px-3 py-1 rounded bg-accentTeal/10 text-accentTeal text-[11px] font-semibold shadow-sm transition-all";
                btnHate.className = "px-3 py-1 rounded bg-slate-950 text-slate-500 text-[11px] font-semibold pointer-events-none transition-all";
            } else {
                btnHate.className = "px-3 py-1 rounded bg-accentRose/10 text-accentRose text-[11px] font-semibold shadow-sm transition-all";
                btnOp.className = "px-3 py-1 rounded bg-slate-950 text-slate-500 text-[11px] font-semibold pointer-events-none transition-all";
            }
            
            if (qNum === 1) {
                if (type === 'op') {
                    feedback.innerHTML = `<span class="text-accentTeal"><i class="fa-solid fa-circle-check"></i> ถูกต้อง! นี่คือการวิจารณ์ผลงานเชิงนโยบายของรัฐ แม้จะใช้คำหนักแน่นแต่ก็ถือเป็นสิทธิ์ตามกรอบประชาธิปไตย</span>`;
                } else {
                    feedback.innerHTML = `<span class="text-accentRose"><i class="fa-solid fa-circle-xmark"></i> ยังไม่ถูกต้อง! สเตตัสนี้มุ่งวิพากษ์นโยบายสาธารณะ ยังไม่เข้าข่าย Hate Speech</span>`;
                }
            } else {
                if (type === 'hate') {
                    feedback.innerHTML = `<span class="text-accentRose"><i class="fa-solid fa-circle-check"></i> ถูกต้อง! สเตตัสนี้มุ่งลดทอนความเป็นมนุษย์ของคนอื่นโดยใช้อัตลักษณ์ทางชาติพันธุ์ มุ่งสร้างความเดียดฉันท์และเกลียดชัง</span>`;
                } else {
                    feedback.innerHTML = `<span class="text-accentRose"><i class="fa-solid fa-circle-xmark"></i> ยังไม่ถูกต้อง! สเตตัสนี้มุ่งทำลายเกียรติความเป็นมนุษย์ จึงถือเป็นความผิดทาง Hate Speech</span>`;
                }
            }
        }

        function toggleStopCheck(key) {
            appState.stopChecklist[key] = !appState.stopChecklist[key];
            evalStopFeedback();
        }

        function evalStopFeedback() {
            const fbk = document.getElementById("stop-feedback");
            if (!fbk) return;
            const checks = appState.stopChecklist;
            const count = Object.values(checks).filter(Boolean).length;
            
            if (count === 0) {
                fbk.innerHTML = "กรุณาติ๊กเลือกแนวทางเช็คลิสต์ด้านซ้ายเพื่อทดลองประเมินทักษะสากล";
            } else if (count < 4) {
                fbk.innerHTML = `<span class="text-accentAmber font-semibold">คุณมีความพยายามที่ดี (${count}/4)! แต่อย่าลืมพยายามทบทวนกระบวนการ STOP ให้ครบทุกมิติเพื่อความปลอดภัยในการเสพข้อมูลสารสนเทศ</span>`;
            } else {
                fbk.innerHTML = `<span class="text-accentTeal font-bold"><i class="fa-solid fa-award"></i> สมบูรณ์แบบ! คุณมีคุณสมบัติและสติสัมปชัญญะของพลเมืองไซเบอร์ยุคดิจิทัลพร้อมสกัดกั้นวิกฤตพายุข่าวปลอมระดับสากล</span>`;
            }
        }

        function submitSlide29Quiz(choice) {
            appState.quizAnswers['s29'] = choice;
            const fbk = document.getElementById("q29-feedback");
            const btnA = document.getElementById("q29-A");
            const btnB = document.getElementById("q29-B");
            if (!fbk || !btnA || !btnB) return;
            
            if (choice === 'A') {
                btnA.className = "w-full text-left p-2.5 rounded bg-accentRose/10 text-accentRose text-xs shadow-sm transition-all";
                btnB.className = "w-full text-left p-2.5 rounded bg-slate-950 text-slate-500 pointer-events-none text-xs transition-all";
                fbk.innerHTML = "<span class='text-accentRose'><i class='fa-solid fa-circle-xmark'></i> ยังไม่ถูกต้อง! การรีบแชร์โดยไม่เช็คแหล่งข่าวสุ่มเสี่ยงต่อการทำผิด พ.ร.บ. คอมพิวเตอร์และป้อนพายุข้อมูลปลอมซ้ำเติมเหยื่อ</span>";
            } else {
                btnB.className = "w-full text-left p-2.5 rounded bg-accentTeal/10 text-accentTeal text-xs shadow-sm transition-all";
                btnA.className = "w-full text-left p-2.5 rounded bg-slate-950 text-slate-500 pointer-events-none text-xs transition-all";
                fbk.innerHTML = "<span class='text-accentTeal'><i class='fa-solid fa-circle-check'></i> ถูกต้องที่สุด! การดึงเวลาเพื่อตรวจสอบ สันโดษจากดราม่า และกดยื่นฟังก์ชันรายงานระบบคือความรับผิดชอบที่ดีที่สุด</span>";
            }
        }

        function toggleAccordion(id) {
            const acc = document.getElementById(id);
            if (acc) {
                acc.classList.toggle("hidden");
            }
        }

        // Key Navigation listeners
        document.addEventListener("keydown", function(e) {
            if (e.key === "ArrowRight") {
                navigateSlide('next');
            } else if (e.key === "ArrowLeft") {
                navigateSlide('prev');
            }
        });

        // Initialize presentation engine
        window.onload = () => {
            loadActiveSlide();
        };
    </script>
</body>
</html>
