                                <h3 class="text-base sm:text-lg font-bold text-emeraldNeon flex items-center gap-2"><i class="fa-solid fa-clipboard-list"></i> รายละเอียดภารกิจ (1 หน้ากระดาษ A4):</h3>
                                <ul class="text-xs sm:text-sm text-slate-300 space-y-2 leading-relaxed">
                                    <li><strong>1. เลือกข่าวจริง:</strong> ค้นหาข่าวสารไอทีย้อนหลังไม่เกิน 2 ปีที่เกี่ยวกับ <strong>Data Privacy, Cybercrime หรือ AI Ethics</strong></li>
                                    <li><strong>2. เขียนวิเคราะห์มิติ:</strong> อธิบายว่าข่าวดังกล่าว ขัดหรือเกี่ยวข้องต่อหัวข้อ <strong>"กฎหมาย"</strong> หรือ <strong>"จริยธรรม"</strong> อย่างไรอย่างเป็นรูปธรรม</li>
                                    <li><strong>3. เสนอทางแก้ไขป้องกัน:</strong> ในฐานะนักพัฒนาโปรแกรม คุณจะมีขั้นตอนออกแบบคัดกรองระบบอย่างไรเพื่อไม่ให้เกิดประเด็นนี้ซ้ำ</li>
                                </ul>
                            </div>
                            <div class="lg:col-span-5 bg-gradient-to-br from-cardDark to-slate-950 p-4 sm:p-6 rounded-2xl border border-emeraldNeon/30 flex flex-col justify-center items-center text-center gap-3">
                                <div class="text-emeraldNeon text-3xl"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                                <h4 class="text-sm sm:text-base font-bold text-white font-tech tracking-wider">LMS SUBMISSION</h4>
                                <p class="text-[11px] sm:text-xs text-slate-400">
                                    ส่งมอบงานในรูปแบบไฟล์ PDF ผ่านระบบ LMS มหาวิทยาลัย <br> ภายในเวลา 23:59 น. ของวันก่อนหน้าคลาสเรียนครั้งต่อไป
                                </p>
                                <span class="text-[10px] bg-slate-800 text-slate-300 px-3 py-1 rounded-full border border-slate-700">LATE NOT ACCEPTED</span>
                            </div>
                        </div>
                    </div>
                `
            }
        ];

        let currentSlideIndex = 0;

        // Populate Slide Navigator Sidebar
        function renderSidebar() {
            const listContainer = document.getElementById("sidebar-list");
            listContainer.innerHTML = "";
            slides.forEach((slide, index) => {
                const btn = document.createElement("button");
                btn.className = `text-left text-xs sm:text-sm p-3 rounded-xl border transition-all flex justify-between items-center w-full ${
                    index === currentSlideIndex 
                        ? "bg-tealNeon/10 border-tealNeon text-tealNeon font-bold" 
                        : "bg-slate-900 border-borderSlate hover:border-slate-500 text-slate-400"
                }`;
                btn.onclick = () => {
                    goToSlide(index);
                    if (window.innerWidth < 640) { // Auto close sidebar on mobile tap
                        toggleSidebar();
                    }
                };
                
                // Truncate title for sidebar safely
                const titleText = slide.title.length > 28 ? slide.title.substring(0, 28) + "..." : slide.title;
                btn.innerHTML = `
                    <span>${titleText}</span>
                    <span class="font-tech text-[10px] sm:text-xs bg-slate-800 px-2 py-0.5 rounded text-slate-500">${slide.chapter}</span>
                `;
                listContainer.appendChild(btn);
            });
        }

        // Sidebar drawer toggler
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.classList.toggle("translate-x-full");
        }

        // Render current slide with full element hydration
        function renderSlide() {
            const currentSlide = slides[currentSlideIndex];
            const slideContainer = document.getElementById("slide-content");
            
            // Format slide number
            const numText = (currentSlideIndex + 1).toString().padStart(2, '0');
            const totalText = slides.length.toString().padStart(2, '0');
            document.getElementById("slide-number-display").innerText = `SLIDE ${numText} / ${totalText}`;
            
            // Inject slide content HTML
            slideContainer.innerHTML = currentSlide.html;
            
            // Rehydrate interactive states based on current active slide index
            rehydrateInteractiveElements();
        }

        // Navigate slides
        function nextSlide() {
            if (currentSlideIndex < slides.length - 1) {
                currentSlideIndex++;
                renderSlide();
                renderSidebar();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
                renderSidebar();
            }
        }

        function goToSlide(index) {
            currentSlideIndex = index;
            renderSlide();
            renderSidebar();
        }

        // Case Study Reveal operations
        function toggleCaseReveal(caseNum) {
            const box = document.getElementById(`reveal-case-${caseNum}`);
            const btn = document.getElementById(`reveal-btn-${caseNum}`);
            if (!box || !btn) return;
            
            if (box.classList.contains("hidden")) {
                box.classList.remove("hidden");
                btn.innerText = "🔒 คลิกเพื่อซ่อนคำวิเคราะห์เคส";
                btn.classList.add("bg-slate-700", "text-slate-100");
                btn.classList.remove("bg-tealNeon", "text-slate-950");
                revealStates[caseNum] = true;
            } else {
                box.classList.add("hidden");
                btn.innerText = "คลิกแสดงคำวิเคราะห์เคสอย่างเป็นทางการ";
                btn.classList.remove("bg-slate-700", "text-slate-100");
                btn.classList.add("bg-tealNeon", "text-slate-950");
                revealStates[caseNum] = false;
            }
        }

        // Active Dilemma Vote handlers
        function voteDilemma(option) {
            votedDilemmaState = option;
            if (option === 'yes') {
                dilemmaVoteYes++;
            } else if (option === 'no') {
                dilemmaVoteNo++;
            }
            rehydrateDilemmaPoll();
        }

        function resetVote() {
            votedDilemmaState = null;
            dilemmaVoteYes = 14;
            dilemmaVoteNo = 28;
            rehydrateDilemmaPoll();
        }

        function rehydrateDilemmaPoll() {
            const container = document.getElementById("dilemma-poll-container");
            if (!container) return;

            const total = dilemmaVoteYes + dilemmaVoteNo;
            const yesPercent = Math.round((dilemmaVoteYes / total) * 100);
            const noPercent = Math.round((dilemmaVoteNo / total) * 100);

            if (votedDilemmaState === null) {
                container.innerHTML = `
                    <button onclick="voteDilemma('yes')" class="w-full text-left p-3.5 rounded-lg bg-slate-800 hover:bg-tealNeon hover:text-slate-950 transition-all flex justify-between items-center group font-medium">
                        <span>1. แอบเปิดดูสิ ไม่มีใครรู้ และเราไม่ได้ทำลายใคร</span>
                        <span class="text-xs font-bold text-tealNeon group-hover:text-slate-950">คลิกโหวต</span>
                    </button>
                    <button onclick="voteDilemma('no')" class="w-full text-left p-3.5 rounded-lg bg-slate-800 hover:bg-roseNeon hover:text-white transition-all flex justify-between items-center group font-medium">
                        <span>2. ไม่เปิดดูเด็ดขาด เพราะเป็นสิทธิส่วนบุคคลของผู้อื่น</span>
                        <span class="text-xs font-bold text-roseNeon group-hover:text-white">คลิกโหวต</span>
                    </button>
                `;
            } else {
                container.innerHTML = `
                    <div class="space-y-3">
                        <div class="p-3.5 bg-slate-800 border border-slate-700 rounded-lg">
                            <div class="flex justify-between items-center mb-1 text-sm">
                                <span>1. แอบเปิดดูสิ ไม่มีใครรู้ (${dilemmaVoteYes} โหวต)</span>
                                <span class="font-bold text-tealNeon">${yesPercent}%</span>
                            </div>
                            <div class="w-full bg-slate-950 h-2 rounded-full overflow-hidden">
                                <div class="bg-tealNeon h-full" style="width: ${yesPercent}%"></div>
                            </div>
                        </div>
                        <div class="p-3.5 bg-slate-800 border border-slate-700 rounded-lg">
                            <div class="flex justify-between items-center mb-1 text-sm">
                                <span>2. ไม่เปิดดูเด็ดขาด (${dilemmaVoteNo} โหวต)</span>
                                <span class="font-bold text-roseNeon">${noPercent}%</span>
                            </div>
                            <div class="w-full bg-slate-950 h-2 rounded-full overflow-hidden">
                                <div class="bg-roseNeon h-full" style="width: ${noPercent}%"></div>
                            </div>
                        </div>
                        <button onclick="resetVote()" class="text-xs text-tealNeon underline self-start block hover:text-white transition-colors">
                            รีเซ็ตสถิติโหวตของห้องเรียน
                        </button>
                    </div>
                `;
            }
        }

        // Stopwatch controller
        function controlTimer(action) {
            if (action === 'start') {
                if (timerInterval) return;
                timerInterval = setInterval(() => {
                    if (timerSeconds > 0) {
                        timerSeconds--;
                        updateTimerUI();
                    } else {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        alert("⏰ หมดเวลาสำหรับกิจกรรมกลุ่มแล้ว!");
                    }
                }, 1000);
            } else if (action === 'pause') {
                clearInterval(timerInterval);
                timerInterval = null;
            } else if (action === 'reset') {
                clearInterval(timerInterval);
                timerInterval = null;
                timerSeconds = 300;
                updateTimerUI();
            }
        }

        function updateTimerUI() {
            const display = document.getElementById("countdown-display");
            if (!display) return;
            const mins = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
            const secs = (timerSeconds % 60).toString().padStart(2, '0');
            display.innerText = `${mins}:${secs}`;
        }

        // Rehydrate slides states
        function rehydrateInteractiveElements() {
            // Rehydrate Slide 2 Dilemma Poll
            if (currentSlideIndex === 1) {
                rehydrateDilemmaPoll();
            }
            // Rehydrate Slide 27 Timer
            if (currentSlideIndex === 26) {
                updateTimerUI();
            }
            // Rehydrate Case Studies 1-5
            if (currentSlideIndex >= 27 && currentSlideIndex <= 31) {
                const caseNum = currentSlideIndex - 26; // 1 to 5
                if (revealStates[caseNum]) {
                    const box = document.getElementById(`reveal-case-${caseNum}`);
                    const btn = document.getElementById(`reveal-btn-${caseNum}`);
                    if (box && btn) {
                        box.classList.remove("hidden");
                        btn.innerText = "🔒 คลิกเพื่อซ่อนคำวิเคราะห์เคส";
                        btn.classList.add("bg-slate-700", "text-slate-100");
                        btn.classList.remove("bg-tealNeon", "text-slate-950");
                    }
                }
            }
        }

        // Keyboard arrow key navigation
        document.addEventListener("keydown", function(event) {
            if (event.key === "ArrowRight") {
                nextSlide();
            } else if (event.key === "ArrowLeft") {
                prevSlide();
            }
        });

        // Touch Swipe Navigation for responsive mobile devices
        let touchstartX = 0;
        let touchendX = 0;
        
        function handleGesture() {
            if (touchendX < touchstartX - 60) {
                nextSlide(); // Swipe Left -> Go Next
            }
            if (touchendX > touchstartX + 60) {
                prevSlide(); // Swipe Right -> Go Prev
            }
        }
        
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, false);
        
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleGesture();
        }, false);

        // Initialize App
        window.onload = () => {
            renderSlide();
            renderSidebar();
        }
    </script>
</body>
</html>
