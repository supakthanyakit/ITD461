        let currentSlideIndex = 0;

        // Populate Slide Navigator Sidebar
        function renderSidebar() {
            const listContainer = document.getElementById("sidebar-list");
            listContainer.innerHTML = "";
            slides.forEach((slide, index) => {
                const btn = document.createElement("button");
                btn.className = `text-left text-xs sm:text-sm p-3 rounded-xl border transition-all flex justify-between items-center w-full ${
                    index === currentSlideIndex 
                        ? "bg-tealNeon/10 border-tealNeon text-tealNeon font-bold" 
                        : "bg-slate-900 border-borderSlate hover:border-slate-500 text-slate-400"
                }`;
                btn.onclick = () => {
                    goToSlide(index);
                    if (window.innerWidth < 640) { // Auto close sidebar on mobile tap
                        toggleSidebar();
                    }
                };
                
                // Truncate title for sidebar to keep it neat
                const titleText = slide.title.length > 28 ? slide.title.substring(0, 28) + "..." : slide.title;
                btn.innerHTML = `
                    <span>${titleText}</span>
                    <span class="font-tech text-[10px] sm:text-xs bg-slate-800 px-2 py-0.5 rounded text-slate-500">${slide.chapter}</span>
                `;
                listContainer.appendChild(btn);
            });
        }

        // Sidebar drawer toggler
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.classList.toggle("translate-x-full");
        }

        // Render current slide
        function renderSlide() {
            const currentSlide = slides[currentSlideIndex];
            const slideContainer = document.getElementById("slide-content");
            
            // Format slide number
            const numText = (currentSlideIndex + 1).toString().padStart(2, '0');
            const totalText = slides.length.toString().padStart(2, '0');
            document.getElementById("slide-number-display").innerText = `SLIDE ${numText} / ${totalText}`;
            
            // Inject slide content html
            slideContainer.innerHTML = currentSlide.html;
            
            // Rehydrate interactive states (Checkboxes/Inputs for Warm-up and Quizzes)
            rehydrateInteractiveElements();
        }

        // Navigate slide
        function nextSlide() {
            if (currentSlideIndex < slides.length - 1) {
                currentSlideIndex++;
                renderSlide();
                renderSidebar();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
                renderSidebar();
            }
        }

        function goToSlide(index) {
            currentSlideIndex = index;
            renderSlide();
            renderSidebar();
        }

        // Show/Hide click to reveal elements
        function revealAnswer(id) {
            const element = document.getElementById(id);
            if (element) {
                element.classList.toggle("hidden");
            }
        }

        // Handle Active Checkboxes on Slide 2
        function handleWarmupClick(id) {
            const checkbox = document.getElementById(id);
            warmUpStates[id] = checkbox.checked;
        }

        // Handle Multi-choice state inside Slide 16 (Incident Response Quiz)
        function selectIncidentChoice(choiceId) {
            miniQuizAnswers["slide16"] = choiceId;
            const feedback = document.getElementById("incident-feedback");
            
            // Reset buttons style
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`inc-btn-${i}`);
                if (btn) {
                    btn.className = "text-left p-3 rounded-xl bg-slate-800 border border-slate-750 hover:bg-slate-700 transition-all text-slate-300 text-xs sm:text-sm";
                }
            }
            
            const selectedBtn = document.getElementById(`inc-btn-${choiceId}`);
            if (!selectedBtn) return;
            
            if (choiceId === 3) {
                selectedBtn.className = "text-left p-3 rounded-xl bg-emeraldNeon/10 border-emeraldNeon/50 text-emeraldNeon transition-all font-bold text-xs sm:text-sm";
                feedback.innerHTML = `<span class="text-emeraldNeon"><i class="fa-solid fa-circle-check"></i> ถูกต้องตามขั้นตอนมาตรฐานทางกฎหมาย! การแจ้งรายงานข้อมูลรั่วไหลต่อ PDPC ใน 72 ชม. และรายงานประสาน NCSA ทันทีเนื่องจากเป็นโครงข่ายโรงพยาบาลวิกฤต (CII) ถือเป็นกระบวนการรักษาความปลอดภัยอย่างมืออาชีพ</span>`;
            } else if (choiceId === 1) {
                selectedBtn.className = "text-left p-3 rounded-xl bg-roseNeon/10 border-roseNeon/50 text-roseNeon transition-all font-bold text-xs sm:text-sm";
                feedback.innerHTML = `<span class="text-roseNeon"><i class="fa-solid fa-circle-xmark"></i> ผิดกฎหมายและผิดต่อจริยธรรม! หากปล่อยปละละเลยไม่ยอมรายงานข้อมูลรั่วต่อ PDPC ภายใน 72 ชม. จะมีโทษปรับทางปกครองถึง 5 ล้านบาท และส่งผลเสียร้ายแรงต่อโรงพยาบาล</span>`;
            } else {
                selectedBtn.className = "text-left p-3 rounded-xl bg-amberNeon/10 border-amberNeon/50 text-amberNeon transition-all font-bold text-xs sm:text-sm";
                feedback.innerHTML = `<span class="text-amberNeon"><i class="fa-solid fa-triangle-exclamation"></i> ขั้นตอนมีความเสี่ยงสูง! การโอนเงินจ่ายค่าไถ่ให้มิจฉาชีพไม่ได้ช่วยการันตีความปลอดภัยข้อมูลรั่ว และคุณจำเป็นต้องแจ้งรายงานปัญหาต่อ PDPC ควบคู่กันตามหน้าที่อย่างเคร่งครัด</span>`;
            }
        }

        // Rehydrate/restore state of elements after slide change
        function rehydrateInteractiveElements() {
            // Restore Slide 2 checkboxes
            for (let id in warmUpStates) {
                const element = document.getElementById(id);
                if (element) {
                    element.checked = warmUpStates[id];
                }
            }
            // Restore Slide 16 quiz selection
            if (miniQuizAnswers["slide16"]) {
                selectIncidentChoice(miniQuizAnswers["slide16"]);
            }
        }

        // Keyboard Navigation Listener
        document.addEventListener("keydown", function(event) {
            if (event.key === "ArrowRight") {
                nextSlide();
            } else if (event.key === "ArrowLeft") {
                prevSlide();
            }
        });

        // Touch Swipe Navigation for Perfect Mobile Responsiveness
        let touchstartX = 0;
        let touchendX = 0;
        
        function handleGesture() {
            if (touchendX < touchstartX - 60) {
                nextSlide(); // Swipe Left -> Go Next Slide
            }
            if (touchendX > touchstartX + 60) {
                prevSlide(); // Swipe Right -> Go Previous Slide
            }
        }
        
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, false);
        
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleGesture();
        }, false);

        // Initialize presentation on window load
        window.onload = () => {
            renderSlide();
            renderSidebar();
        }
    </script>
