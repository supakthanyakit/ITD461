                                    <ul class="list-disc pl-5 mt-2 text-[11px] sm:text-xs text-slate-400 space-y-1">
                                        <li>ความถูกต้องของทฤษฎีและคำอ้างอิงกฎหมายลิขสิทธิ์</li>
                                        <li>การยกตัวอย่างประยุกต์ใช้ในอุตสาหกรรมเทคโนโลยีที่เด่นชัด</li>
                                        <li>การคิดวิเคราะห์เชิงลึกอย่างมีจริยธรรมผู้ประกอบวิชาชีพ</li>
                                        <li>การเสนอทางออกเชิงจรรยาบรรณไอทีที่สร้างสรรค์และใช้งานได้จริง</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            }
        ];

        let currentSlideIndex = 0;

        function renderSidebar() {
            const listContainer = document.getElementById("sidebar-list");
            listContainer.innerHTML = "";
            slidesData.forEach((slide, index) => {
                const btn = document.createElement("button");
                btn.className = `text-left text-xs sm:text-sm p-3 rounded-xl border transition-all flex justify-between items-center w-full ${
                    index === currentSlideIndex 
                        ? "bg-tealNeon/10 border-tealNeon text-tealNeon font-bold" 
                        : "bg-slate-900 border-borderSlate hover:border-slate-500 text-slate-400"
                }`;
                btn.onclick = () => {
                    goToSlide(index);
                    if (window.innerWidth < 1024) { // Auto close drawer on tap in mobile screens
                        toggleSidebar();
                    }
                };
                
                // Truncate title for list representation
                const truncatedTitle = slide.title.length > 32 ? slide.title.substring(0, 32) + "..." : slide.title;
                btn.innerHTML = `
                    <span>${truncatedTitle}</span>
                    <span class="font-tech text-[10px] sm:text-xs bg-slate-800 px-2.5 py-0.5 rounded text-slate-500 font-semibold uppercase">${slide.chapter}</span>
                `;
                listContainer.appendChild(btn);
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.classList.toggle("translate-x-full");
        }

        function renderSlide() {
            const currentSlide = slidesData[currentSlideIndex];
            const slideContainer = document.getElementById("slide-content");
            
            // Render slide index display
            const numDisplay = (currentSlideIndex + 1).toString().padStart(2, '0');
            const totalDisplay = slidesData.length.toString().padStart(2, '0');
            document.getElementById("slide-number-display").innerText = `SLIDE ${numDisplay} / ${totalDisplay}`;
            
            // Ingest HTML templates
            slideContainer.innerHTML = currentSlide.html;
            
            // Re-hydrate any interactive states and values
            rehydrateInteractiveStates();
        }

        function nextSlide() {
            if (currentSlideIndex < slidesData.length - 1) {
                currentSlideIndex++;
                renderSlide();
                renderSidebar();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
                renderSidebar();
            }
        }

        function goToSlide(index) {
            currentSlideIndex = index;
            renderSlide();
            renderSidebar();
        }

        // Slide 2: Active Checkbox Persistence
        function handleCheckboxClick(id) {
            const checkbox = document.getElementById(id);
            if (checkbox) {
                selectedCheckboxes[id] = checkbox.checked;
            }
        }

        // Slide 20: Logo Game Handler
        function handleLogoAnswer(answerId) {
            selectedLogoAnswer = answerId;
            const feedback = document.getElementById("logo-game-feedback");
            
            // Reset button states
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`logo-ans-${i}`);
                if (btn) {
                    btn.className = "text-left p-2 rounded-xl bg-slate-800 border border-slate-700 hover:bg-slate-750 transition-all text-slate-300 flex items-center gap-3 w-full";
                }
            }

            const selectedBtn = document.getElementById(`logo-ans-${answerId}`);
            if (selectedBtn) {
                if (answerId === 2) {
                    selectedBtn.className = "text-left p-2 rounded-xl bg-emeraldNeon/10 border-emeraldNeon/50 text-emeraldNeon transition-all font-bold flex items-center gap-3 w-full";
                    feedback.innerHTML = `<span class="text-emeraldNeon"><i class="fa-solid fa-circle-check"></i> ถูกต้อง! สัญลักษณ์หรือชื่อทั่วไปที่ไม่มีลักษณะเฉพาะเด่นชัด (เช่น คำสามัญทั่วไป "ส้ม" ที่ใช้ค้าขายผลส้ม) ไม่สามารถยื่นขอสิทธิ์ผูกขาดสัญลักษณ์เพื่อจดเครื่องหมายการค้าได้ในทางสากล</span>`;
                } else {
                    selectedBtn.className = "text-left p-2 rounded-xl bg-roseNeon/10 border-roseNeon/50 text-roseNeon transition-all font-bold flex items-center gap-3 w-full";
                    feedback.innerHTML = `<span class="text-roseNeon"><i class="fa-solid fa-circle-xmark"></i> ยังไม่ถูกต้อง! ข้อความหรือองค์ประกอบลายเส้นที่มีฟังก์ชั่นจำแนกแบรนด์ชัดเจนสามารถจดเป็นลิขสิทธิ์/เครื่องหมายการค้าได้ตามระเบียบกฎหมายไอที</span>`;
                }
            }
        }

        // Slide 25: Business CIO Reveal
        function revealCIOAnswer() {
            const feed = document.getElementById("cio-feedback");
            if (feed) {
                feed.classList.toggle("hidden");
            }
        }

        // Slide 37: Quiz Handler
        function handleQuizAnswer(choiceId) {
            quizAnswers[currentSlideIndex] = choiceId;
            const feedback = document.getElementById("quiz-feedback");
            
            // Reset buttons style
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`quiz-btn-${i}`);
                if (btn) {
                    btn.className = "text-left p-3 rounded-xl bg-slate-800 border border-slate-700 hover:bg-slate-750 transition-all text-slate-300 text-xs sm:text-sm w-full";
                }
            }

            const selectedBtn = document.getElementById(`quiz-btn-${choiceId}`);
            if (selectedBtn) {
                if (choiceId === 2) {
                    selectedBtn.className = "text-left p-3 rounded-xl bg-emeraldNeon/10 border-emeraldNeon/50 text-emeraldNeon transition-all font-bold text-xs sm:text-sm w-full";
                    feedback.innerHTML = `<span class="text-emeraldNeon"><i class="fa-solid fa-circle-check"></i> คำตอบถูกต้อง! โปรแกรมซอฟต์แวร์จัดอยู่ในประเภทวรรณกรรม ภายใต้พ.ร.บ.ลิขสิทธิ์ และได้รับการคุ้มครองสิทธิ์เด็ดขาดแก่ผู้เขียนทันทีโดยอัตโนมัติหลังเขียนซอร์สโค้ดเสร็จสิ้นโดยไม่ต้องยื่นจด</span>`;
                } else {
                    selectedBtn.className = "text-left p-3 rounded-xl bg-roseNeon/10 border-roseNeon/50 text-roseNeon transition-all font-bold text-xs sm:text-sm w-full";
                    feedback.innerHTML = `<span class="text-roseNeon"><i class="fa-solid fa-circle-xmark"></i> คำตอบผิด! ซอฟต์แวร์จัดอยู่ในประเภทวรรณกรรมของลิขสิทธิ์ (Copyright) และคุ้มครองอัตโนมัติโดยปราศจากข้อบังคับที่ต้องยื่นดำเนินการจดทะเบียน</span>`;
                }
            }
        }

        // Slide 39: Dynamic Case Study Tab Switcher
        function switchCaseTab(tabId) {
            activeCaseTab = tabId;
            
            // Reset tab colors
            const tabIds = ["image", "music", "font", "code"];
            tabIds.forEach(id => {
                const tabBtn = document.getElementById(`tab-${id}`);
                if (tabBtn) {
                    tabBtn.className = "text-left px-3 py-2.5 rounded bg-slate-800 hover:bg-slate-750 text-slate-300 flex items-center justify-between transition-all w-full text-xs sm:text-sm";
                }
            });

            // Highlight active tab button
            const activeBtn = document.getElementById(`tab-${tabId}`);
            if (activeBtn) {
                activeBtn.className = "text-left px-3 py-2.5 rounded bg-tealNeon text-slate-950 font-bold flex items-center justify-between transition-all w-full text-xs sm:text-sm";
            }

            const contentArea = document.getElementById("case-tab-content");
            if (!contentArea) return;

            let contentHTML = "";
            switch (tabId) {
                case "image":
                    contentHTML = `
                        <h3 class="text-base sm:text-lg font-bold text-roseNeon mb-2"><i class="fa-solid fa-circle-xmark"></i> ความเสี่ยงเรื่องภาพประกอบจาก Google Search:</h3>
                        <p class="text-xs sm:text-sm text-slate-300 leading-relaxed mb-4">
                            การดาวน์โหลดรูปภาพผลงานผู้อื่นจาก Google มาใช้งานโดยตรงโดยไม่ระบุสิทธิ์อนุญาต <strong class="text-roseNeon">ถือว่าผิดกฎหมายลิขสิทธิ์ทันที</strong> เนื่องจากตัวสิทธิ์รูปภาพเหล่านั้นเกิดขึ้นโดยอัตโนมัติแก่ช่างภาพต้นฉบับ
                        </p>
                        <div class="p-3 bg-slate-950 rounded-lg border border-slate-850 text-xs text-slate-400 leading-relaxed">
                            <strong>แนวทางปฏิบัติให้ถูกต้อง:</strong> เปลี่ยนไปใช้คลังภาพลิขสิทธิ์ฟรี (Creative Commons / Unsplash / Pexels) หรือจัดหาซื้อภาพประกอบลิขสิทธิ์ถูกต้องพร้อมระบุให้เกียรติเครดิตชื่อผู้สร้างสรรค์ผลงาน
                        </div>
                    `;
                    break;
                case "music":
                    contentHTML = `
                        <h3 class="text-base sm:text-lg font-bold text-roseNeon mb-2"><i class="fa-solid fa-circle-xmark"></i> ความเสี่ยงเรื่องเพลงประกอบคัดลอกจากคลิป YouTube:</h3>
                        <p class="text-xs sm:text-sm text-slate-300 leading-relaxed mb-4">
                            การนำเอาเพลง ดนตรี ของผู้อื่นมาสอดแทรกประกอบเว็บไซต์ มีส่วนผิดกฎหมาย <strong class="text-roseNeon">ละเมิดสิทธิ์ทำซ้ำ ดัดแปลง และเผยแพร่ต่อสาธารณชน</strong> ทันที แม้จะเขียนเครดิตอ้างอิงถึงนักร้องแล้วก็ตาม
                        </p>
                        <div class="p-3 bg-slate-950 rounded-lg border border-slate-850 text-xs text-slate-400 leading-relaxed">
                            <strong>แนวทางปฏิบัติให้ถูกต้อง:</strong> ใช้แหล่งไฟล์เสียงดนตรีประกอบแบบ Royalty-Free Music (เช่น YouTube Audio Library) หรือดนตรีแบบไม่ต้องจ่ายค่าสิทธิ์ที่อนุญาตให้ดาวน์โหลดใช้ฟรีสำหรับสถาบันการศึกษา
                        </div>
                    `;
                    break;
                case "font":
                    contentHTML = `
                        <h3 class="text-base sm:text-lg font-bold text-roseNeon mb-2"><i class="fa-solid fa-circle-xmark"></i> ความเสี่ยงเรื่องฟอนต์ฟรีดาวน์โหลดจากอินเทอร์เน็ต:</h3>
                        <p class="text-xs sm:text-sm text-slate-300 leading-relaxed mb-4">
                            ฟอนต์ส่วนใหญ่มีสัญญาสิทธิ์กำกับสากล หลายสัญญากำหนดให้ใช้ฟรีเฉพาะ <strong class="text-amberNeon">"งานส่วนตัวศึกษาเท่านั้น (Personal Use)"</strong> หากนักศึกษานำไปประยุกต์ใช้ทำพาณิชย์ หรือลงหน้าเว็บที่มีคนเข้าใช้จำนวนมากอาจถูกฟ้องร้องปรับเงินชดเชยค่าลิขสิทธิ์
                        </p>
                        <div class="p-3 bg-slate-950 rounded-lg border border-slate-850 text-xs text-slate-400 leading-relaxed">
                            <strong>แนวทางปฏิบัติให้ถูกต้อง:</strong> เลือกใช้งานฟอนต์ระบบเปิดที่คุ้มครองฟรีสิทธิ์ทุกระดับ (เช่น Google Fonts) หรือฟอนต์ที่ได้รับอนุญาตครอบคลุมสัญญาเชิงพาณิชย์ (Commercial Use Free Fonts)
                        </div>
                    `;
                    break;
                case "code":
                    contentHTML = `
                        <h3 class="text-base sm:text-lg font-bold text-amberNeon mb-2"><i class="fa-solid fa-circle-info"></i> ความเสี่ยงเรื่องบล็อกโค้ดปรับแต่งจากคลัง GitHub:</h3>
                        <p class="text-xs sm:text-sm text-slate-300 leading-relaxed mb-4">
                            คลังโค้ดบน GitHub มีการสวมสัญญาอนุญาต (Open Source Licenses) แตกต่างกัน การก๊อปปี้ไปใช้งานโดยละเลยสัญญา มีสิทธิ์ทำให้นักพัฒนาฟ้องร้องเรียกร้องลิขสิทธิ์ได้
                        </p>
                        <div class="p-3 bg-slate-950 rounded-lg border border-slate-850 text-xs text-slate-400 leading-relaxed">
                            <strong>แนวทางปฏิบัติให้ถูกต้อง:</strong> สังเกตตราแจ้ง License ในคลังต้นฉบับ หากเป็น MIT หรือ Apache สามารถนำมาปรับดัดแปลงส่งต่องานได้ เพียงแค่ต้องทำการก๊อปปี้สัญญาสิทธิ์ระบุชื่อผู้สร้างดั้งเดิมใส่รวมไว้ในไฟล์โค้ดแอปด้วย
                        </div>
                    `;
                    break;
            }
            contentArea.innerHTML = contentHTML;
        }

        // Re-hydrate saved student inputs and selections when shifting back and forth between slides
        function rehydrateInteractiveStates() {
            // Re-hydrate checkboxes on Slide 2
            if (currentSlideIndex === 1) {
                for (let key in selectedCheckboxes) {
                    const el = document.getElementById(key);
                    if (el) {
                        el.checked = selectedCheckboxes[key];
                    }
                }
            }
            // Re-hydrate Logo Game selection on Slide 20
            if (currentSlideIndex === 19 && selectedLogoAnswer !== null) {
                handleLogoAnswer(selectedLogoAnswer);
            }
            // Re-hydrate Quiz choice on Slide 37
            if (currentSlideIndex === 36 && quizAnswers[currentSlideIndex]) {
                handleQuizAnswer(quizAnswers[currentSlideIndex]);
            }
            // Re-hydrate Case Study Tab on Slide 39
            if (currentSlideIndex === 38) {
                switchCaseTab(activeCaseTab);
            }
        }

        // Keyboard arrow controls for university teachers & students
        document.addEventListener("keydown", function(event) {
            if (event.key === "ArrowRight") {
                nextSlide();
            } else if (event.key === "ArrowLeft") {
                prevSlide();
            }
        });

        // Touch Swipe gestural controller for modern mobile screens
        let touchstartX = 0;
        let touchendX = 0;
        
        function handleSwipeGesture() {
            if (touchendX < touchstartX - 70) {
                nextSlide(); // Swiped left -> next
            }
            if (touchendX > touchstartX + 70) {
                prevSlide(); // Swiped right -> prev
            }
        }
        
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, false);
        
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipeGesture();
        }, false);

        // Run presentation rendering workflow once DOM elements are fully loaded
        window.onload = () => {
            renderSlide();
            renderSidebar();
        }
    </script>
</body>
</html>
